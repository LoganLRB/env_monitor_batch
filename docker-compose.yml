# Local development only. Production runs on MWAA + EMR Serverless + S3.
# LocalStack replaces S3 so you can run the full pipeline without an AWS account.

x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    PYTHONPATH: /opt/airflow
    # Point boto3 at LocalStack instead of real AWS
    AWS_ENDPOINT_URL: http://localstack:4566
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    # Pipeline settings
    ENVIRONMENT: local
    API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000}
    S3_BUCKET: env-monitor-local
    S3_PREFIX: sensor-data
    MWAA_BUCKET: env-monitor-local
    FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-300}
    EXPECTED_SENSOR_COUNT: ${EXPECTED_SENSOR_COUNT:-12}
    # Dummy values. DAG switches to PythonOperator when ENVIRONMENT=local.
    EMR_APPLICATION_ID: local
    EMR_EXECUTION_ROLE_ARN: arn:aws:iam::000000000000:role/local
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    localstack:
      condition: service_healthy

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
        until python3 -c "import boto3; boto3.client('s3',endpoint_url='http://localstack:4566',aws_access_key_id='test',aws_secret_access_key='test',region_name='us-east-1').create_bucket(Bucket='env-monitor-local')" 2>/dev/null; do
          echo "Waiting for LocalStack S3..."; sleep 2;
        done
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  airflow-logs:
  localstack-data:
