name: Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: dev
            role_var: AWS_ROLE_DEV

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan -input=false -no-color -var="api_base_url=${{ vars.API_BASE_URL }}" 2>&1 | tee /tmp/tfplan.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.env }}';
            const outcome = '${{ steps.plan.outcome }}';
            const raw = fs.readFileSync('/tmp/tfplan.txt', 'utf8');
            const maxLength = 60000;
            const planOutput = raw.length > maxLength
              ? raw.substring(0, maxLength) + '\n...(truncated)'
              : raw;
            const body = `### Terraform Plan — \`${env}\`: ${outcome === 'success' ? '✅' : '❌'}

            <details><summary>Show output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
