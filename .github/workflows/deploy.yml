name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — no long-lived AWS keys in GitHub secrets
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Package the pipeline module so EMR can import it via --py-files
      - name: Package pipeline for EMR
        run: zip -r pipeline.zip pipeline/

      - name: Upload pipeline assets to MWAA bucket
        env:
          MWAA_BUCKET: ${{ secrets.MWAA_BUCKET }}
        run: |
          aws s3 cp pipeline.zip         s3://$MWAA_BUCKET/pipeline.zip
          aws s3 sync scripts/            s3://$MWAA_BUCKET/scripts/
          aws s3 sync dags/               s3://$MWAA_BUCKET/dags/
          aws s3 cp requirements-mwaa.txt s3://$MWAA_BUCKET/requirements.txt
